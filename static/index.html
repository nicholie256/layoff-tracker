<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alabama WARN Act Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
    }

    header {
      background: #1a1d2e;
      border-bottom: 1px solid #2d3154;
      padding: 1rem 2rem;
      display: flex;
      align-items: baseline;
      gap: 1rem;
    }
    header h1 { font-size: 1.25rem; font-weight: 600; color: #e2e8f0; }
    header span { font-size: 0.8rem; color: #64748b; }

    nav {
      display: flex;
      gap: 0;
      border-bottom: 1px solid #2d3154;
      background: #1a1d2e;
      padding: 0 2rem;
    }
    nav button {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: #64748b;
      cursor: pointer;
      font-size: 0.875rem;
      padding: 0.75rem 1.25rem;
      transition: color 0.15s, border-color 0.15s;
    }
    nav button:hover { color: #e2e8f0; }
    nav button.active { color: #818cf8; border-bottom-color: #818cf8; }

    /* Filter bar */
    #filter-bar {
      background: #13162a;
      border-bottom: 1px solid #2d3154;
      padding: 0.75rem 2rem;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 1.5rem;
    }

    .filter-group {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .filter-label {
      color: #64748b;
      font-size: 0.78rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    /* Toggle buttons for event type */
    .toggle-group { display: flex; gap: 2px; }
    .toggle-group button {
      background: #1e2235;
      border: 1px solid #2d3154;
      border-radius: 4px;
      color: #94a3b8;
      cursor: pointer;
      font-size: 0.8rem;
      padding: 0.3rem 0.75rem;
      transition: background 0.12s, color 0.12s, border-color 0.12s;
    }
    .toggle-group button:hover { background: #252a42; color: #e2e8f0; }
    .toggle-group button.active {
      background: #2e3460;
      border-color: #818cf8;
      color: #c7d2fe;
    }

    /* Year inputs */
    .filter-input {
      background: #1e2235;
      border: 1px solid #2d3154;
      border-radius: 4px;
      color: #e2e8f0;
      font-size: 0.82rem;
      padding: 0.3rem 0.6rem;
      outline: none;
      transition: border-color 0.15s;
      width: 5rem;
    }
    .filter-input:focus { border-color: #818cf8; }
    .filter-input::placeholder { color: #475569; }

    #min-employees-input { width: 6rem; }

    .filter-reset {
      background: none;
      border: none;
      color: #475569;
      cursor: pointer;
      font-size: 0.78rem;
      margin-left: auto;
      padding: 0.25rem 0.5rem;
      text-decoration: underline;
      transition: color 0.15s;
    }
    .filter-reset:hover { color: #94a3b8; }

    /* Main content */
    main { padding: 1.5rem 2rem; max-width: 1400px; }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    #search-bar {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }

    #search-input {
      flex: 1;
      max-width: 480px;
      background: #1a1d2e;
      border: 1px solid #2d3154;
      border-radius: 6px;
      color: #e2e8f0;
      font-size: 0.9rem;
      padding: 0.5rem 0.875rem;
      outline: none;
      transition: border-color 0.15s;
    }
    #search-input:focus { border-color: #818cf8; }
    #search-input::placeholder { color: #475569; }

    .result-count {
      font-size: 0.8rem;
      color: #64748b;
      margin-bottom: 0.75rem;
      min-height: 1.2em;
    }

    .table-wrap { overflow-x: auto; }

    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }

    th {
      background: #1a1d2e;
      border-bottom: 1px solid #2d3154;
      color: #94a3b8;
      font-weight: 500;
      padding: 0.6rem 0.875rem;
      text-align: left;
      white-space: nowrap;
    }
    th.num { text-align: right; }

    td {
      border-bottom: 1px solid #1e2235;
      padding: 0.55rem 0.875rem;
      white-space: nowrap;
    }
    tr:nth-child(even) td { background: #13162a; }
    tr:hover td { background: #1e2744; }
    td.num { text-align: right; font-variant-numeric: tabular-nums; }

    .badge {
      border-radius: 4px;
      display: inline-block;
      font-size: 0.75rem;
      padding: 0.15rem 0.5rem;
    }
    .badge-closure { background: #3b1818; color: #fca5a5; }
    .badge-layoff  { background: #1c2a3b; color: #93c5fd; }

    .empty { color: #475569; font-size: 0.875rem; padding: 2rem 0; text-align: center; }
  </style>
</head>
<body>

<header>
  <h1>Alabama WARN Act Tracker</h1>
  <span>workforce.alabama.gov</span>
</header>

<nav>
  <button class="active" data-tab="search">Search</button>
  <button data-tab="top-size">Top by Size</button>
  <button data-tab="top-recent">Most Recent</button>
</nav>

<div id="filter-bar">
  <div class="filter-group">
    <span class="filter-label">Type</span>
    <div class="toggle-group" id="type-toggle">
      <button class="active" data-value="">All</button>
      <button data-value="Closure">Closure</button>
      <button data-value="Layoff">Layoff</button>
    </div>
  </div>

  <div class="filter-group">
    <span class="filter-label">Year</span>
    <input class="filter-input" id="year-from" type="number" placeholder="From" min="1998" />
    <span style="color:#475569">–</span>
    <input class="filter-input" id="year-to"   type="number" placeholder="To"   min="1998" />
  </div>

  <div class="filter-group">
    <span class="filter-label">Min employees</span>
    <input class="filter-input" id="min-employees-input" type="number" placeholder="Any" min="1" />
  </div>

  <button class="filter-reset" id="reset-filters">Reset filters</button>
</div>

<main>
  <div id="search" class="tab-panel active">
    <div id="search-bar">
      <input id="search-input" type="search" placeholder="Search by company name…" autocomplete="off" />
    </div>
    <div class="result-count" id="search-count"></div>
    <div class="table-wrap">
      <table id="search-table">
        <thead><tr>
          <th>Company</th><th>City</th><th>Type</th>
          <th class="num">Employees</th><th>Announced</th><th>Effective</th><th>Case ID</th>
        </tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <div id="top-size" class="tab-panel">
    <div class="result-count" id="size-count"></div>
    <div class="table-wrap">
      <table id="size-table">
        <thead><tr>
          <th>Company</th><th>City</th><th>Type</th>
          <th class="num">Employees</th><th>Announced</th><th>Effective</th><th>Case ID</th>
        </tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <div id="top-recent" class="tab-panel">
    <div class="result-count" id="recent-count"></div>
    <div class="table-wrap">
      <table id="recent-table">
        <thead><tr>
          <th>Company</th><th>City</th><th>Type</th>
          <th class="num">Employees</th><th>Announced</th><th>Effective</th><th>Case ID</th>
        </tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</main>

<script>
  // --- Tab switching ---
  let activeTab = 'search';

  document.querySelectorAll('nav button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      activeTab = btn.dataset.tab;
      document.getElementById(activeTab).classList.add('active');
      refreshActiveTab();
    });
  });

  // --- Filters ---
  let eventType = '';

  document.querySelectorAll('#type-toggle button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#type-toggle button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      eventType = btn.dataset.value;
      refreshAll();
    });
  });

  document.getElementById('year-from').addEventListener('change', refreshAll);
  document.getElementById('year-to').addEventListener('change', refreshAll);
  document.getElementById('min-employees-input').addEventListener('change', refreshAll);

  document.getElementById('reset-filters').addEventListener('click', () => {
    eventType = '';
    document.querySelectorAll('#type-toggle button').forEach(b => b.classList.remove('active'));
    document.querySelector('#type-toggle button[data-value=""]').classList.add('active');
    document.getElementById('year-from').value = '';
    document.getElementById('year-to').value = '';
    document.getElementById('min-employees-input').value = '';
    refreshAll();
  });

  function getFilterParams() {
    const p = new URLSearchParams();
    if (eventType) p.set('event_type', eventType);
    const yFrom = document.getElementById('year-from').value;
    const yTo   = document.getElementById('year-to').value;
    const minEmp = document.getElementById('min-employees-input').value;
    if (yFrom) p.set('year_from', yFrom);
    if (yTo)   p.set('year_to',   yTo);
    if (minEmp) p.set('min_employees', minEmp);
    return p;
  }

  // Fix: set year max dynamically so it never becomes stale
  const currentYear = new Date().getFullYear();
  document.getElementById('year-from').max = currentYear;
  document.getElementById('year-to').max = currentYear;

  // --- Rendering ---
  function escapeHtml(val) {
    if (val == null) return '';
    return String(val)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function typeBadge(type) {
    if (!type) return '';
    const cls = type.toLowerCase().startsWith('clos') ? 'badge-closure' : 'badge-layoff';
    return `<span class="badge ${cls}">${escapeHtml(type.replace(' *', ''))}</span>`;
  }

  function renderRows(tbody, rows) {
    if (!rows.length) {
      tbody.innerHTML = '<tr><td colspan="7" class="empty">No results.</td></tr>';
      return;
    }
    tbody.innerHTML = rows.map(r => `
      <tr>
        <td>${escapeHtml(r.company_name)}</td>
        <td>${escapeHtml(r.city)}</td>
        <td>${typeBadge(r.event_type)}</td>
        <td class="num">${r.affected_employees != null ? r.affected_employees.toLocaleString() : ''}</td>
        <td>${escapeHtml(r.announcement_date)}</td>
        <td>${escapeHtml(r.effective_date)}</td>
        <td>${escapeHtml(r.case_id)}</td>
      </tr>`).join('');
  }

  function showError(countEl, tbodyEl) {
    countEl.textContent = 'Error loading data. Is the server running?';
    tbodyEl.innerHTML = '';
  }

  // --- Search ---
  let searchTimer = null;
  const searchInput = document.getElementById('search-input');

  searchInput.addEventListener('input', () => {
    clearTimeout(searchTimer);
    const q = searchInput.value.trim();
    if (!q) {
      document.getElementById('search-count').textContent = '';
      document.querySelector('#search-table tbody').innerHTML = '';
      return;
    }
    searchTimer = setTimeout(runSearch, 200);
  });

  async function runSearch() {
    const q = searchInput.value.trim();
    if (!q) return;
    const p = getFilterParams();
    p.set('q', q);
    try {
      const res = await fetch(`/api/search?${p}`);
      if (!res.ok) throw new Error(res.status);
      const data = await res.json();
      const n = data.count;
      document.getElementById('search-count').textContent =
        n ? `${n} result${n !== 1 ? 's' : ''}` : 'No results.';
      renderRows(document.querySelector('#search-table tbody'), data.results);
    } catch {
      showError(
        document.getElementById('search-count'),
        document.querySelector('#search-table tbody'),
      );
    }
  }

  // --- Top by size ---
  async function loadTopSize() {
    const p = getFilterParams();
    try {
      const res = await fetch(`/api/top-size?${p}`);
      if (!res.ok) throw new Error(res.status);
      const data = await res.json();
      document.getElementById('size-count').textContent =
        `${data.results.length} notices — sorted by employees affected`;
      renderRows(document.querySelector('#size-table tbody'), data.results);
    } catch {
      showError(
        document.getElementById('size-count'),
        document.querySelector('#size-table tbody'),
      );
    }
  }

  // --- Most recent ---
  async function loadTopRecent() {
    const p = getFilterParams();
    try {
      const res = await fetch(`/api/top-recent?${p}`);
      if (!res.ok) throw new Error(res.status);
      const data = await res.json();
      document.getElementById('recent-count').textContent =
        `${data.results.length} notices — sorted by announcement date`;
      renderRows(document.querySelector('#recent-table tbody'), data.results);
    } catch {
      showError(
        document.getElementById('recent-count'),
        document.querySelector('#recent-table tbody'),
      );
    }
  }

  function refreshActiveTab() {
    if (activeTab === 'search') runSearch();
    else if (activeTab === 'top-size') loadTopSize();
    else if (activeTab === 'top-recent') loadTopRecent();
  }

  function refreshAll() {
    const q = searchInput.value.trim();
    if (!q) {
      document.getElementById('search-count').textContent = '';
      document.querySelector('#search-table tbody').innerHTML = '';
    } else {
      runSearch();
    }
    loadTopSize();
    loadTopRecent();
  }

  // Initial load
  loadTopSize();
  loadTopRecent();
  searchInput.focus();
</script>
</body>
</html>
